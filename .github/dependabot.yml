version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-security:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react-security:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
